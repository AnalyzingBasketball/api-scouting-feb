name: Robot de Actualizacion FEB

on:
  schedule:
    # Se ejecuta automáticamente todos los martes a las 04:00 AM (Hora UTC)
  - cron: '0 4 * * 1,4'
  workflow_dispatch:
    # Esto nos permite ejecutar el robot manualmente con un botón cuando queramos

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar librerías
        run: pip install -r requirements.txt

      - name: 🤖 Ejecutar el Robot (Scraping y Limpieza)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python updater.py

      - name: 💾 Guardar los nuevos datos en GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git commit -m "🤖 Automatización: Roster, Calendario y Partidos actualizados" || echo "No hay datos nuevos para guardar"
          git push
